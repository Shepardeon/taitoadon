server {
  #listen 443 ssl;
  listen 80;
  server_name shepardeon.dev www.shepardeon.dev;

  #ssl_certificate /etc/letsencrypt/live/ton-domaine.com/fullchain.pem;
  #ssl_certificate_key /etc/letsencrypt/live/ton-domaine.com/privkey.pem;

  # Frontend
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Websocket pour colyseus
  location /colyseus/ {
    proxy_pass http://server:2567/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}